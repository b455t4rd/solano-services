// ── DRAG & DROP SORT ──
function bindDragSort(){
  const container=document.getElementById('anlagen-list');
  if(!container)return;
  const items=()=>[...container.querySelectorAll('.list-item[data-id]')];
  let dragged=null,saveTimer=null;

  function saveOrder(){
    clearTimeout(saveTimer);
    saveTimer=setTimeout(async()=>{
      const sparte=pageData.sparte||'winterdienst';
      const reihenfolge=items().map((el,i)=>({anlage_id:parseInt(el.dataset.id),position:i}));
      try{await apiPost('/api/anlagen/reihenfolge',{sparte,reihenfolge})}catch(e){}
    },600);
  }

  items().forEach(item=>{
    const handle=item.querySelector('.drag-handle');
    if(!handle)return;

    // Mouse drag – fix: track mousedown on handle for PC compatibility
    let dragOk=false;
    handle.addEventListener('mousedown',()=>{dragOk=true});
    document.addEventListener('mouseup',()=>{dragOk=false},{once:false});
    item.setAttribute('draggable','true');
    item.addEventListener('dragstart',e=>{
      if(!dragOk){e.preventDefault();return}
      dragged=item;item.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    item.addEventListener('dragend',()=>{dragged=null;item.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'))});
    item.addEventListener('dragover',e=>{
      e.preventDefault();if(!dragged||dragged===item)return;
      document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
      item.classList.add('drag-over');
    });
    item.addEventListener('drop',e=>{
      e.preventDefault();if(!dragged||dragged===item)return;
      item.classList.remove('drag-over');
      const allItems=items();
      const fromIdx=allItems.indexOf(dragged),toIdx=allItems.indexOf(item);
      if(fromIdx<toIdx)container.insertBefore(dragged,item.nextSibling);
      else container.insertBefore(dragged,item);
      saveOrder();
    });

    // Touch drag (Long Press → Move)
    let touchTimer=null,touchDrag=false,ghost=null,startY=0,offsetY=0;
    handle.addEventListener('touchstart',e=>{
      e.preventDefault();
      const touch=e.touches[0];
      startY=touch.clientY;
      touchTimer=setTimeout(()=>{
        touchDrag=true;
        dragged=item;item.classList.add('dragging');
        ghost=item.cloneNode(true);
        ghost.style.cssText=`position:fixed;left:${item.getBoundingClientRect().left}px;top:${item.getBoundingClientRect().top}px;width:${item.offsetWidth}px;opacity:.85;z-index:999;pointer-events:none;background:white;box-shadow:0 8px 24px rgba(0,0,0,.2);border-radius:12px`;
        document.body.appendChild(ghost);
        offsetY=touch.clientY-item.getBoundingClientRect().top;
      },400);
    },{passive:false});
    handle.addEventListener('touchmove',e=>{
      if(touchTimer&&Math.abs(e.touches[0].clientY-startY)>5){clearTimeout(touchTimer);touchTimer=null}
      if(!touchDrag)return;
      e.preventDefault();
      const touch=e.touches[0];
      if(ghost)ghost.style.top=(touch.clientY-offsetY)+'px';
      const el=document.elementFromPoint(touch.clientX,touch.clientY)?.closest('.list-item[data-id]');
      if(el&&el!==dragged){
        document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
        el.classList.add('drag-over');
      }
    },{passive:false});
    handle.addEventListener('touchend',e=>{
      clearTimeout(touchTimer);touchTimer=null;
      if(!touchDrag){touchDrag=false;dragged=null;return}
      touchDrag=false;
      if(ghost){ghost.remove();ghost=null}
      const touch=e.changedTouches[0];
      const target=document.elementFromPoint(touch.clientX,touch.clientY)?.closest('.list-item[data-id]');
      if(target&&target!==dragged){
        const allItems=items();
        const fromIdx=allItems.indexOf(dragged),toIdx=allItems.indexOf(target);
        if(fromIdx<toIdx)container.insertBefore(dragged,target.nextSibling);
        else container.insertBefore(dragged,target);
        saveOrder();
      }
      if(dragged)dragged.classList.remove('dragging');
      document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
      dragged=null;
    });
  });
}

function bindGeplantDragSort(){
  const container=document.getElementById('geplant-list');
  if(!container)return;
  const items=()=>[...container.querySelectorAll('.geplant-item[data-id]')];
  let dragged=null,saveTimer=null;

  function saveOrder(){
    clearTimeout(saveTimer);
    saveTimer=setTimeout(async()=>{
      const reihenfolge=items().map((el,i)=>({id:parseInt(el.dataset.id),sort_order:i}));
      try{await apiPost('/api/projekte/geplant/sort',{reihenfolge})}catch(e){}
    },600);
  }

  items().forEach(item=>{
    const handle=item.querySelector('.drag-handle-geplant');
    if(!handle)return;
    let dragOk=false;
    handle.addEventListener('mousedown',()=>{dragOk=true});
    document.addEventListener('mouseup',()=>{dragOk=false},{once:false});
    item.setAttribute('draggable','true');
    item.addEventListener('dragstart',e=>{
      if(!dragOk){e.preventDefault();return}
      dragged=item;item.style.opacity='.5';e.dataTransfer.effectAllowed='move';
    });
    item.addEventListener('dragend',()=>{dragged=null;item.style.opacity='';document.querySelectorAll('.geplant-drag-over').forEach(el=>el.classList.remove('geplant-drag-over'))});
    item.addEventListener('dragover',e=>{e.preventDefault();if(!dragged||dragged===item)return;document.querySelectorAll('.geplant-drag-over').forEach(el=>el.classList.remove('geplant-drag-over'));item.classList.add('geplant-drag-over');item.style.borderColor='#7c3aed';});
    item.addEventListener('dragleave',()=>{item.classList.remove('geplant-drag-over');item.style.borderColor='';});
    item.addEventListener('drop',e=>{
      e.preventDefault();if(!dragged||dragged===item)return;
      item.classList.remove('geplant-drag-over');item.style.borderColor='';
      const all=items(),from=all.indexOf(dragged),to=all.indexOf(item);
      if(from<to)container.insertBefore(dragged,item.nextSibling);else container.insertBefore(dragged,item);
      saveOrder();
    });
    // Touch drag
    let tTimer=null,tDrag=false,ghost=null,startY=0,offY=0;
    handle.addEventListener('touchstart',e=>{
      e.preventDefault();const t=e.touches[0];startY=t.clientY;
      tTimer=setTimeout(()=>{
        tDrag=true;dragged=item;item.style.opacity='.5';
        ghost=item.cloneNode(true);
        ghost.style.cssText=`position:fixed;left:${item.getBoundingClientRect().left}px;top:${item.getBoundingClientRect().top}px;width:${item.offsetWidth}px;opacity:.85;z-index:999;pointer-events:none;background:white;box-shadow:0 8px 24px rgba(0,0,0,.2);border-radius:12px`;
        document.body.appendChild(ghost);offY=t.clientY-item.getBoundingClientRect().top;
      },300);
    },{passive:false});
    handle.addEventListener('touchmove',e=>{
      if(tTimer&&Math.abs(e.touches[0].clientY-startY)>5){clearTimeout(tTimer);tTimer=null}
      if(!tDrag)return;e.preventDefault();const t=e.touches[0];
      if(ghost)ghost.style.top=(t.clientY-offY)+'px';
      const el=document.elementFromPoint(t.clientX,t.clientY)?.closest('.geplant-item[data-id]');
      if(el&&el!==dragged){document.querySelectorAll('.geplant-drag-over').forEach(x=>{x.classList.remove('geplant-drag-over');x.style.borderColor=''});el.classList.add('geplant-drag-over');el.style.borderColor='#7c3aed';}
    },{passive:false});
    handle.addEventListener('touchend',e=>{
      clearTimeout(tTimer);tTimer=null;if(!tDrag){tDrag=false;dragged=null;return}
      tDrag=false;if(ghost){ghost.remove();ghost=null}
      const t=e.changedTouches[0];
      const target=document.elementFromPoint(t.clientX,t.clientY)?.closest('.geplant-item[data-id]');
      if(target&&target!==dragged){const all=items(),from=all.indexOf(dragged),to=all.indexOf(target);if(from<to)container.insertBefore(dragged,target.nextSibling);else container.insertBefore(dragged,target);saveOrder();}
      if(dragged){dragged.style.opacity='';document.querySelectorAll('.geplant-drag-over').forEach(x=>{x.classList.remove('geplant-drag-over');x.style.borderColor=''});}dragged=null;
    });
  });
}

  document.querySelectorAll('.nach-ja,.nach-nein').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const id=btn.dataset.id;
      const antwort=btn.classList.contains('nach-ja')?'ja':'nein';
      try{
        await apiPut(`/api/nachrichten/${id}/antwort`,{antwort});
        toast(antwort==='ja'?'✅ Bestätigt!':'❌ Abgelehnt','ok');
        setTimeout(()=>go('home'),800);
      }catch(e){toast(e.message,'err')}
    });
  });

  // Meine TODOs abhaken (Startseite)
  document.querySelectorAll('.mein-todo-check').forEach(cb=>{
    cb.addEventListener('change',async()=>{
      const id=cb.dataset.id;
      try{
        await apiPut(`/api/todos/${id}`,{});
        const row=cb.closest('div[style*="border-bottom"]');
        if(row){row.style.opacity='.4';row.style.textDecoration='line-through'}
        toast('Erledigt ✓','ok');
        // Kurz warten dann neu laden
        setTimeout(()=>go('home'),1200);
      }catch(e){cb.checked=false;toast(e.message,'err')}
    });
  });

  // Home
  o('btn-logout','click',doLogout);
  o('btn-resume','click',()=>go('einsatz'));
  o('card-zeit','click',()=>go('zeit'));
  o('card-projekte','click',()=>go('projekte'));
  o('card-kalender','click',()=>{_kalMonth=null;go('kalender');});
  o('card-winter','click',()=>go('anlagen',{sparte:'winterdienst'}));
  o('card-gebaeude','click',()=>go('anlagen',{sparte:'gebaeudereinigung'}));
  o('card-gruenpflege','click',()=>go('anlagen',{sparte:'gruenpflege'}));
  o('nav-gruenpflege','click',()=>go('anlagen',{sparte:'gruenpflege'}));
  o('btn-open-todos','click',()=>go('admin',{adminTab:'todos'}));
  o('nav-admin-home','click',()=>go('admin',{adminTab:'anlagen'}));

  // Back
  o('btn-back','click',()=>{
    if(page==='anlage-detail')go('anlagen',{sparte:pageData.sparte||'winterdienst'});
    else if(page==='einsatz'&&einsatzAkt)go('anlage-detail',{anlageId:einsatzAkt.anlage_id,sparte:einsatzAkt.sparte||'winterdienst'});
    else go('home');
  });

  // Karten-Toggle
  o('btn-toggle-map','click',()=>{pageData.mapView=!pageData.mapView;go('anlagen',{...pageData})});

  // Suche
  o('search-input','input',e=>{
    const q=e.target.value.toLowerCase();
    document.querySelectorAll('#anlagen-list .list-item').forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(q)?'':'none'});
  });

  // Anlagen Liste — Klick auf Zeile (nicht auf Drag-Handle)
  document.querySelectorAll('#anlagen-list .list-item').forEach(r=>{
    r.addEventListener('click',e=>{
      if(e.target.closest('.drag-handle'))return;
      go('anlage-detail',{anlageId:r.dataset.id,sparte:pageData.sparte});
    });
  });

  // Drag & Drop Reihenfolge
  bindDragSort();
  bindGeplantDragSort();

  // Anlagen-Karte für Mitarbeiter
  initAnlagenKarteIfNeeded();

  // Anlage Detail
  o('btn-nav','click',()=>{const a=pageData.anlage;if(a)openNav(a.lat,a.lng,`${a.adresse} ${a.plz||''} ${a.ort||''}`)});
  o('btn-einsatz','click',async()=>{
    const a=pageData.anlage;if(!a)return;
    if(einsatzAkt&&einsatzAkt.anlage_id==a.id){go('einsatz');return}
    // GPS-Radius-Check (nur wenn Anlage Koordinaten hat)
    let gps_check_ok=null;
    if(a.lat&&a.lng&&navigator.geolocation){
      try{
        const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{enableHighAccuracy:true,timeout:8000}));
        const dist=haversineDist(pos.coords.latitude,pos.coords.longitude,parseFloat(a.lat),parseFloat(a.lng));
        if(dist>500){toast(`Zu weit entfernt (${Math.round(dist)} m). Bitte vor Ort sein.`,'err');return}
        gps_check_ok=true;
      }catch(e){
        // GPS nicht verfügbar → ohne Check starten
        gps_check_ok=null;
      }
    }
    try{const e=await apiPost('/api/einsaetze/start',{anlage_id:a.id,sparte:pageData.sparte||'winterdienst',gps_check_ok});einsatzAkt={...e,anlage_name:a.name,anlage_id:a.id};localStorage.setItem('solano_einsatz',JSON.stringify(einsatzAkt));go('einsatz')}
    catch(err){toast(err.message,'err')}
  });

  // Einsatz
  if(page==='einsatz'&&einsatzAkt){startTimer(einsatzAkt.start_zeit);startGPS()}
  o('btn-end-einsatz','click',async()=>{
    if(!confirm('Einsatz wirklich beenden?'))return;
    const notiz=document.getElementById('notiz-input')?.value||'';
    try{await flushGPS();await apiPut(`/api/einsaetze/${einsatzAkt.id}/ende`,{notiz});stopGPS();stopTimer();einsatzAkt=null;localStorage.removeItem('solano_einsatz');localStorage.removeItem('solano_gps_batch');toast('Einsatz beendet','ok');go('home')}
    catch(e){toast(e.message,'err')}
  });

  // Checklist
  document.querySelectorAll('.check-item[data-aufgabe]').forEach(item=>{
    item.addEventListener('click',async()=>{
      const aid=item.dataset.aufgabe;
      try{
        const r=await apiPost(`/api/einsaetze/${einsatzAkt.id}/aufgabe`,{aufgabe_id:aid});
        const box=item.querySelector('.check-box'),lbl=item.querySelector('.check-label');
        if(r.erledigt){box.className='check-box done';box.textContent='✓';lbl.className='check-label done'}
        else{box.className='check-box';box.textContent='';lbl.className='check-label'}
        const done=document.querySelectorAll('.check-box.done').length,total=document.querySelectorAll('.check-item[data-aufgabe]').length,pct=total?Math.round(done/total*100):0;
        const bar=document.getElementById('progress-bar');if(bar)bar.style.width=pct+'%';
        const cnt=document.getElementById('progress-count');if(cnt)cnt.textContent=`${done}/${total}`;
      }catch(e){toast(e.message,'err')}
    });
  });

  // TODOs Einsatz
  o('btn-add-todo','click',async()=>{
    const bez=document.getElementById('todo-input')?.value?.trim();
    if(!bez)return;
    try{
      const t=await apiPost('/api/todos',{anlage_id:einsatzAkt?.anlage_id,einsatz_id:einsatzAkt?.id,beschreibung:bez});
      document.getElementById('todo-input').value='';
      const list=document.getElementById('todo-list');
      if(list){const d=document.createElement('div');d.style.cssText='padding:6px 0;font-size:13px;color:var(--success);border-bottom:1px solid var(--border)';d.textContent='✓ '+t.beschreibung;list.prepend(d)}
      toast('Meldung gespeichert','ok');
    }catch(e){toast(e.message,'err')}
  });
  o('todo-input','keydown',e=>{if(e.key==='Enter'){e.preventDefault();document.getElementById('btn-add-todo')?.click()}});

  // Fotos Einsatz
  o('foto-input','change',e=>handleFoto(e.target.files[0]));
  o('galerie-input','change',e=>handleFoto(e.target.files[0]));
  document.querySelectorAll('.photo-del').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();delFoto(btn.dataset.fotoid,btn.closest('.photo-thumb'))}));

  // Admin Tabs
  document.querySelectorAll('.tab-btn[data-tab]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      pageData.adminTab=btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
      const c=document.getElementById('admin-tab-content');
      if(c){c.innerHTML=`<div class="loading"><div class="spinner"></div></div>`;try{c.innerHTML=await renderTab(btn.dataset.tab);}catch(e){c.innerHTML=`<div style="padding:24px;color:#dc2626">Fehler beim Laden: ${e.message}</div>`;}bindAdminEvents();initKarteIfNeeded()}
    });
  });

  // Admin buttons (auch in bindAdminEvents für Tab-Wechsel)
  o('btn-new-anlage','click',()=>modalAnlage());
  o('btn-new-ma','click',()=>modalMitarbeiter());

  bindAdminEvents();
  initKarteIfNeeded();
  initAnlagenKarteIfNeeded();
}

function reloadTab(){const c=document.getElementById('admin-tab-content');if(c){const tab=pageData.adminTab||'anlagen';renderTab(tab).then(h=>{c.innerHTML=h;bindAdminEvents();});}}

function bindAdminEvents(){
  // Kalender-Einstellungen speichern
  const kss=document.getElementById('btn-kal-settings-save');
  if(kss&&!kss._bound){kss._bound=true;kss.addEventListener('click',async()=>{
    const url=document.getElementById('kal-url')?.value?.trim();

    try{await apiPut('/api/kalender/settings',{exchange_url:url,exchange_user:user2,exchange_pass:pass,sync_intervall_min:intervall});
      toast('✅ Einstellungen gespeichert','ok');reloadTab();
    }catch(e){toast(e.message,'err')}
  })}
  // Kalender manueller Sync (Admin-Tab)
  const ksn=document.getElementById('btn-kal-sync-now');

    const r=document.getElementById('kal-sync-result');

      toast(`✅ Sync: ${res.count} Events`,'ok');
      if(r)r.innerHTML=`<span style="color:var(--success)">✅ ${res.count} Events · ${new Date(res.letzter_sync).toLocaleString('de-AT')}</span>`;
    }catch(e){toast(e.message,'err');if(r)r.innerHTML=`<span style="color:var(--danger)">Fehler: ${esc(e.message)}</span>`;}

  const na=document.getElementById('btn-new-anlage');

  const nm=document.getElementById('btn-new-ma');

  const tfa=document.getElementById('todo-filter-alle');

  const bl=document.getElementById('btn-bericht-laden');
  if(bl&&!bl._bound){bl._bound=true;bl.addEventListener('click',async()=>{
    pageData.berichtVon=document.getElementById('bericht-von')?.value||'';
    pageData.berichtBis=document.getElementById('bericht-bis')?.value||'';
    pageData.berichtSparte=document.getElementById('bericht-sparte')?.value||'';
    const c=document.getElementById('admin-tab-content');
    if(c){c.innerHTML=`<div class="loading"><div class="spinner"></div></div>`;c.innerHTML=await renderTabBerichte();bindAdminEvents()}
  })}
  const bp=document.getElementById('btn-bericht-print');
  if(bp&&!bp._bound){bp._bound=true;bp.addEventListener('click',async()=>{
    const von=pageData.berichtVon||'',bis=pageData.berichtBis||'',sparte=pageData.berichtSparte||'';
    let berichte=[];
    try{berichte=await apiGet(`/api/einsaetze/berichte?von=${von}&bis=${bis}${sparte?'&sparte='+sparte:''}`)}catch(e){toast('Fehler beim Laden','err');return}
    druckeBerichte(berichte,von,bis,sparte);
  })}
  const bs=document.getElementById('bericht-search');
  if(bs&&!bs._bound){bs._bound=true;bs.addEventListener('input',e=>{const q=e.target.value.toLowerCase();document.querySelectorAll('#bericht-results .report-row').forEach(r=>r.style.display=!q||r.dataset.search?.includes(q)?'':'none')})}
  const kr=document.getElementById('btn-karte-reload');
  if(kr&&!kr._bound){kr._bound=true;kr.addEventListener('click',reloadKarte)}
  // Multi-Assign TODO Checkboxen
  document.querySelectorAll('.todo-assign-cb').forEach(cb=>{
    if(cb._b)return;cb._b=true;
    cb.addEventListener('change',async()=>{
      const todoId=cb.dataset.todo;

        .filter(c=>c.checked)
        .map(c=>({id:parseInt(c.dataset.maId),name:c.dataset.maName}));
      try{
        await apiPut(`/api/todos/${todoId}/zuweisen`,{zuweisungen});
        const names=zuweisungen.map(z=>z.name).join(', ');
        toast(names?`Zugewiesen: ${names}`:'Zuweisung entfernt','ok');
      }catch(e){toast(e.message,'err')}

  // Zeiterfassung Admin-Tab
  const zl=document.getElementById('btn-zeit-laden');
  if(zl&&!zl._bound){zl._bound=true;zl.addEventListener('click',async()=>{
    pageData.zeitVon=document.getElementById('zeit-von')?.value||'';
    pageData.zeitBis=document.getElementById('zeit-bis')?.value||'';

    const c=document.getElementById('admin-tab-content');
    if(c){c.innerHTML=`<div class="loading"><div class="spinner"></div></div>`;c.innerHTML=await renderTabZeit();bindAdminEvents()}

  const zpdf=document.getElementById('btn-zeit-pdf');

  });
  const zbtn=document.getElementById('btn-zeit-manuell');
  if(zbtn&&!zbtn._bound){zbtn._bound=true;zbtn.addEventListener('click',async()=>{
    try{const ml=await apiGet('/api/mitarbeiter');modalZeitManuell(ml);}
    catch(e){toast(e.message,'err');}
  });}
  const zcsv=document.getElementById('btn-zeit-csv');
  if(zcsv&&!zcsv._bound){zcsv._bound=true;zcsv.addEventListener('click',async()=>{
    const von=pageData.zeitVon||'',bis=pageData.zeitBis||'',maId=pageData.zeitMa||'';
    try{const d=await apiGet(`/api/zeit/auswertung?von=${von}&bis=${bis}${maId?'&mitarbeiter_id='+maId:''}`);exportZeitCSV(d,von,bis)}catch(e){toast('Fehler','err')}
  })}

  // Projekte Admin-Tab: Laden
  const prl=document.getElementById('btn-proj-laden');
  if(prl&&!prl._bound){prl._bound=true;prl.addEventListener('click',async()=>{
    pageData.projVon=document.getElementById('proj-von')?.value||'';
    pageData.projBis=document.getElementById('proj-bis')?.value||'';
    pageData.projAg=document.getElementById('proj-ag-filter')?.value||'';
    pageData.projSuche=document.getElementById('proj-suche')?.value||'';
    const c=document.getElementById('admin-tab-content');
    if(c){c.innerHTML=`<div class="loading"><div class="spinner"></div></div>`;try{c.innerHTML=await renderTabProjekte();}catch(e){c.innerHTML=`<div style="padding:24px;color:#dc2626">Fehler: ${e.message}</div>`;}bindAdminEvents()}
  })}
  // Suchfeld – Echtzeit-Filter (re-render mit bereits geladenem Zeitraum)
  const psu=document.getElementById('proj-suche');
  if(psu&&!psu._bound){psu._bound=true;let _st;psu.addEventListener('input',()=>{
    clearTimeout(_st);_st=setTimeout(async()=>{
      pageData.projSuche=psu.value||'';
      const c=document.getElementById('admin-tab-content');
      if(c){c.innerHTML=`<div class="loading"><div class="spinner"></div></div>`;try{c.innerHTML=await renderTabProjekte();}catch(e){c.innerHTML=`<div style="padding:24px;color:#dc2626">Fehler: ${e.message}</div>`;}bindAdminEvents()}
    },400);
  })}

  // Projekte: Neuer Auftraggeber
  const nag=document.getElementById('btn-new-ag');
  if(nag&&!nag._bound){nag._bound=true;nag.addEventListener('click',()=>{
    showModal(`
      <button class="modal-close" id="modal-close">×</button>
      <div class="modal-title">Neuer Auftraggeber</div>
      <div class="form-group"><label class="form-label">Name</label><input type="text" class="form-input" id="ag-name-inp"></div>

      <div class="form-group"><label class="form-label">Stundensatz €/h (optional)</label><input type="number" class="form-input" id="ag-sh-inp" step="0.01" value="0"></div>

        <input type="checkbox" id="ag-fzb-inp" style="width:20px;height:20px;cursor:pointer" checked>
        <div>
          <label for="ag-fzb-inp" style="font-weight:600;cursor:pointer">🚗 Fahrzeit wird verrechnet</label>

        <div class="form-group" style="display:flex;align-items:center;gap:10px;padding:10px;background:#f9fafb;border-radius:8px">
          <input type="checkbox" id="ag-fzb-inp" style="width:20px;height:20px;cursor:pointer" ${b.dataset.fzb!=='0'?'checked':''}>
          <div>
            <label for="ag-fzb-inp" style="font-weight:600;cursor:pointer">🚗 Fahrzeit wird verrechnet</label>
            <div style="font-size:12px;color:var(--text-muted)">Wenn deaktiviert, wird die Fahrzeit beim Stundensatz nicht eingerechnet</div>
          </div>
        </div>
        <button class="btn btn-primary" id="btn-ag-save" data-id="${b.dataset.id}">Speichern</button>`);
      setTimeout(()=>o('btn-ag-save','click',async()=>{
        const id=document.getElementById('btn-ag-save')?.dataset.id;

        if(!name){toast('Name erforderlich','err');return}
        try{await apiPut(`/api/projekte/auftraggeber/${id}`,{name,gutschrift_prozent:document.getElementById('ag-gp-inp')?.value||0,stundensatz:document.getElementById('ag-sh-inp')?.value||0,notiz:document.getElementById('ag-notiz-inp')?.value||null,fahrzeit_bezahlt:document.getElementById('ag-fzb-inp')?.checked!==false});
          closeModal();toast('✅ Gespeichert','ok');
          const c=document.getElementById('admin-tab-content');if(c){c.innerHTML=await renderTabProjekte();bindAdminEvents()}
        }catch(e){toast(e.message,'err')}
      }),0);
    });
  });

  // Projekte: Auftraggeber löschen
  document.querySelectorAll('[data-action="del-ag"]').forEach(b=>{
    if(b._bound)return;b._bound=true;
    b.addEventListener('click',async()=>{
      if(!confirm('Auftraggeber deaktivieren?'))return;
      try{await apiDelete(`/api/projekte/auftraggeber/${b.dataset.id}`);toast('Deaktiviert','ok');
        const c=document.getElementById('admin-tab-content');if(c){c.innerHTML=await renderTabProjekte();bindAdminEvents()}
      }catch(e){toast(e.message,'err')}
    });
  });

  // Projekte: Gutschrift erfassen
  document.querySelectorAll('[data-action="proj-gutschrift"]').forEach(b=>{
    if(b._bound)return;b._bound=true;
    b.addEventListener('click',()=>{
      showModal(`
        <button class="modal-close" id="modal-close">×</button>

      setTimeout(()=>o('btn-gs-save','click',async()=>{

          arbeitszeit_manuell_min:arbMinAlt>0?null:arbMinManuell
        });closeModal();toast('✅ Gutschrift gespeichert','ok');
          const c=document.getElementById('admin-tab-content');if(c){c.innerHTML=await renderTabProjekte();bindAdminEvents()}
        }catch(e){toast(e.message,'err')}

    });

  // Projekte: Fahrzeugkosten speichern
  const fzSave=document.getElementById('btn-fz-save');
  if(fzSave&&!fzSave._bound){fzSave._bound=true;fzSave.addEventListener('click',async()=>{
    try{await apiPut('/api/projekte/einstellungen',{

    }catch(e){toast(e.message,'err')}
  })}

  // Projekte: Mitarbeiterkosten speichern
  const maKSave=document.getElementById('btn-ma-kosten-save');
  if(maKSave&&!maKSave._bound){maKSave._bound=true;maKSave.addEventListener('click',async()=>{
    try{await apiPut('/api/projekte/ma-kosten',{
      stundensatz_fa:document.getElementById('ma-fa')?.value||55,
      stundensatz_ha:document.getElementById('ma-ha')?.value||45,

    });toast('✅ Mitarbeiterkosten gespeichert','ok');

    }catch(e){toast(e.message,'err')}

  // Projekte: CSV Export
  const pCsv=document.getElementById('btn-proj-csv');
  if(pCsv&&!pCsv._bound){pCsv._bound=true;pCsv.addEventListener('click',async()=>{
    try{
      const von=document.getElementById('proj-von')?.value||'';
      const bis=document.getElementById('proj-bis')?.value||'';
      const ag=document.getElementById('proj-ag-filter')?.value||'';

    }catch(e){toast('Fehler','err')}
  })}

  // Projekte: PDF Export
  const pPdf=document.getElementById('btn-proj-pdf');
  if(pPdf&&!pPdf._bound){pPdf._bound=true;pPdf.addEventListener('click',async()=>{
    try{
      const von=document.getElementById('proj-von')?.value||'';
      const bis=document.getElementById('proj-bis')?.value||'';
      const ag=document.getElementById('proj-ag-filter')?.value||'';
      const [d,fz]=await Promise.all([
        apiGet(`/api/projekte/auswertung?von=${von}&bis=${bis}${ag?'&auftraggeber_id='+ag:''}`),
        apiGet('/api/projekte/einstellungen')

  // Projekte: Löschen
  // Admin: Auftrag bearbeiten
  document.querySelectorAll('[data-action="proj-edit"]').forEach(b=>{
    if(b._bound)return;b._bound=true;
    b.addEventListener('click',()=>{
      const d=b.dataset;
      showModal(`
        <button class="modal-close" id="modal-close">×</button>
        <div class="modal-title">✏️ Auftrag bearbeiten</div>
        <div class="form-group"><label class="form-label">Auftraggeber</label><input class="form-input" id="pe-agname" value="${esc(d.agname||'')}" placeholder="Auftraggeber"></div>
        <div class="form-group"><label class="form-label">Auftragsnummer</label><input class="form-input" id="pe-nr" value="${esc(d.nr||'')}" placeholder="optional"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">

          <div class="form-group" style="margin:0"><label class="form-label">Arbeitszeit (Stunden)</label><input type="number" class="form-input" id="pe-arbstd" value="${((parseInt(d.arbmin)||0)/60).toFixed(2)}" min="0" step="0.25" placeholder="z.B. 3.5"><div style="font-size:11px;color:var(--text-muted);margin-top:3px">× Anzahl MA = MA-Stunden gesamt</div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="form-group" style="margin:0"><label class="form-label">km Hinfahrt</label><input type="number" class="form-input" id="pe-kmhin" value="${d.kmhin||0}" min="0" step="0.1"></div>
          <div class="form-group" style="margin:0"><label class="form-label">km Rückfahrt</label><input type="number" class="form-input" id="pe-kmzurueck" value="${d.kmzurueck||0}" min="0" step="0.1"></div>
        </div>
        <div class="form-group"><label class="form-label">Besonderheiten</label><textarea class="form-input" id="pe-bez" rows="2" style="resize:vertical">${esc(d.bez||'')}</textarea></div>
        <div style="margin-bottom:12px">
          <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer">
            <input type="checkbox" id="pe-rapport" ${d.rapport==='1'?'checked':''} style="width:18px;height:18px;cursor:pointer">
            <span style="font-weight:600">📋 Rapport anfertigen</span>
          </label>
          <textarea class="form-input" id="pe-rapport-bez" rows="2" placeholder="Rapport-Notizen…" style="margin-top:8px">${esc(d.rapportbez||'')}</textarea>
        </div>
        <button class="btn btn-primary" id="btn-pe-save" data-id="${d.id}">💾 Speichern</button>`);
      setTimeout(()=>o('btn-pe-save','click',async()=>{
        const id=document.getElementById('btn-pe-save')?.dataset.id;
        const arbMin=Math.round((parseFloat(document.getElementById('pe-arbstd')?.value)||0)*60);
        try{
          await apiPut(`/api/projekte/${id}`,{
            auftraggeber_name:document.getElementById('pe-agname')?.value||null,
            auftragsnummer:document.getElementById('pe-nr')?.value||null,
            anzahl_mitarbeiter:parseInt(document.getElementById('pe-ma')?.value)||2,
            arbeitszeit_manuell_min:arbMin,
            km_hin:parseFloat(document.getElementById('pe-kmhin')?.value)||0,
            km_zurueck:parseFloat(document.getElementById('pe-kmzurueck')?.value)||0,
            besonderheiten:document.getElementById('pe-bez')?.value||null,
            rapport_erforderlich:document.getElementById('pe-rapport')?.checked||false,
            rapport_beschreibung:document.getElementById('pe-rapport-bez')?.value||null,
          });

          const c=document.getElementById('admin-tab-content');if(c){c.innerHTML=await renderTabProjekte();bindAdminEvents()}
        }catch(e){toast(e.message,'err')}
      }),0);
    });
  });

  document.querySelectorAll('[data-action="proj-delete"]').forEach(b=>{
    if(b._bound)return;b._bound=true;
    b.addEventListener('click',async()=>{
      if(!confirm('Auftrag unwiderruflich löschen?'))return;
      try{await apiDelete(`/api/projekte/${b.dataset.id}`);toast('Gelöscht','ok');
        const c=document.getElementById('admin-tab-content');if(c){c.innerHTML=await renderTabProjekte();bindAdminEvents()}
      }catch(e){toast(e.message,'err')}
    });
  });

  // Reset-Buttons
  const resetActions={
    'btn-reset-alarme':{label:'alle Alarmierungen',endpoint:'/api/admin/reset/alarme'},
    'btn-reset-nachrichten':{label:'alle Nachrichten',endpoint:'/api/admin/reset/nachrichten'},
    'btn-reset-push-log':{label:'das Push-Protokoll',endpoint:'/api/push/log'},
    'btn-reset-todos':{label:'alle TODOs',endpoint:'/api/admin/reset/todos'},
    'btn-reset-einsaetze':{label:'alle Einsätze & Berichte',endpoint:'/api/admin/reset/einsaetze'},
    'btn-reset-projekte':{label:'alle Projekte/Montagen',endpoint:'/api/admin/reset/projekte'},
  };
  Object.entries(resetActions).forEach(([id,{label,endpoint}])=>{
    const b=document.getElementById(id);
    if(b&&!b._bound){b._bound=true;b.addEventListener('click',async()=>{
      if(!confirm(`⚠️ Wirklich ${label} unwiderruflich löschen?`))return;
      if(!confirm(`Letzte Sicherheitsabfrage: ${label} endgültig löschen?`))return;
      try{
        await apiDelete(endpoint);
        toast(`${label} gelöscht`,'ok');
        reloadTab();
      }catch(e){toast(e.message,'err')}
    })}
  });

  // Anlagen löschen – PIN + 3× Bestätigung
  const bra=document.getElementById('btn-reset-anlagen');
  if(bra&&!bra._bound){bra._bound=true;bra.addEventListener('click',()=>{
    showModal(`
      <button class="modal-close" id="modal-close">×</button>
      <div class="modal-title" style="color:#dc2626">☠️ Alle Anlagen löschen</div>
      <div style="background:#fff5f5;border:2px solid #ef4444;border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;color:#dc2626;font-weight:600">
        ⚠️ Diese Aktion löscht ALLE Anlagen, Aufgaben, Einsätze und zugehörige Daten.<br>Das ist NICHT rückgängig zu machen!
      </div>
      <div class="form-group"><label class="form-label">Admin-PIN zur Bestätigung</label>
        <input type="password" class="form-input" id="reset-anlagen-pin" placeholder="PIN eingeben" inputmode="numeric" maxlength="10">
      </div>
      <button class="btn" id="btn-reset-anlagen-confirm" style="background:#dc2626;color:white;width:100%;margin-top:8px">Weiter →</button>`);
    setTimeout(()=>o('btn-reset-anlagen-confirm','click',async()=>{
      const pin=document.getElementById('reset-anlagen-pin')?.value;
      if(!pin){toast('PIN eingeben','err');return}
      // PIN gegen gespeicherten Hash prüfen (wir senden PIN zur Verifikation ans Backend)
      const pinOk=await apiPost('/api/admin/verify-pin',{pin}).then(r=>r.ok).catch(()=>false);
      if(!pinOk){toast('Falscher PIN!','err');return}
      closeModal();
      if(!confirm('1. Bestätigung: Wirklich ALLE Anlagen unwiderruflich löschen?'))return;
      if(!confirm('2. Bestätigung: Bist du absolut sicher? Es gibt kein Zurück!'))return;
      if(!confirm('3. Bestätigung: Du bist der Boss – wirklich alle Daten vernichten?'))return;
      try{
        await apiDelete('/api/admin/reset/anlagen');
        toast('Alle Anlagen gelöscht','ok');
        reloadTab();
      }catch(e){toast(e.message,'err')}
    }),0);
  })}

  // Alarm auslösen
  const aa=document.getElementById('btn-alarm-ausloesen');
  if(aa&&!aa._bound){aa._bound=true;aa.addEventListener('click',async()=>{
    if(!confirm('🚨 Winterdienst-Alarm wirklich auslösen? Alle Mitarbeiter mit Alarmierung werden benachrichtigt!'))return;
    try{
      const r=await apiPost('/api/alarm/ausloesen',{});
      toast(`🚨 Alarm gesendet an ${r.erfolg} Mitarbeiter!`,'ok');
      reloadTab();
    }catch(e){toast(e.message,'err')}
  })}

  // Nachrichten löschen (Admin-Tab)
  document.querySelectorAll('.nach-del').forEach(btn=>{
    if(btn._b)return;btn._b=true;
    btn.addEventListener('click',async()=>{
      if(!confirm('Nachricht löschen?'))return;
      try{
        await apiDel(`/api/nachrichten/${btn.dataset.id}`);
        toast('Gelöscht','ok');
        await updateNachBadge();
        if(page==='nachrichten')go('nachrichten');else reloadTab();
      }catch(e){toast(e.message,'err')}
    });
  });

  // Nachricht senden (Nachrichten-Tab)
  const ns=document.getElementById('btn-nach-senden');
  if(ns&&!ns._bound){ns._bound=true;ns.addEventListener('click',async()=>{
    const sel=document.getElementById('nach-an-id');
    const anId=sel?.value;
    const anName=sel?.options[sel.selectedIndex]?.dataset?.name||'';
    const text=document.getElementById('nach-text')?.value?.trim();
    if(!anId){toast('Empfänger wählen','err');return}
    if(!text){toast('Nachricht eingeben','err');return}
    try{
      await apiPost('/api/nachrichten',{an_id:parseInt(anId),an_name:anName,text});
      toast('Nachricht gesendet ✓','ok');
      document.getElementById('nach-text').value='';
      reloadTab();
    }catch(e){toast(e.message,'err')}
  })}

  // Push senden
  const ps=document.getElementById('btn-push-senden');
  if(ps&&!ps._bound){ps._bound=true;ps.addEventListener('click',async()=>{
    const nachricht=document.getElementById('push-nachricht')?.value?.trim();
    if(!nachricht){toast('Nachricht eingeben','err');return}
    const alleRadio=document.getElementById('push-alle');
    let mitarbeiter_ids=[];
    if(!alleRadio?.checked){
      const sel=document.querySelector('input[name="push-emp"]:checked');
      if(sel&&sel.value!=='alle')mitarbeiter_ids=[parseInt(sel.value)];
    }
    try{
      const r=await apiPost('/api/push/senden',{nachricht,mitarbeiter_ids});
      toast(`Gesendet: ${r.erfolg} ✓, ${r.fehler} ✗`,'ok');
      document.getElementById('push-nachricht').value='';
      reloadTab();
    }catch(e){toast(e.message,'err')}
  })}
  document.querySelectorAll('[data-action]').forEach(btn=>{
    if(btn._b)return;btn._b=true;
    btn.addEventListener('click',async()=>{
      const{action,id,name,pin}=btn.dataset;
      if(action==='del-anlage'){
        if(!confirm('Anlage löschen?'))return;
        try{await apiDel(`/api/anlagen/${id}`);toast('Gelöscht','ok');reloadTab()}catch(e){toast(e.message,'err')}
      }else if(action==='edit-anlage'){
        try{const a=await apiGet(`/api/anlagen/${id}`);modalAnlage(a)}catch(e){toast(e.message,'err')}
      }else if(action==='aufgaben'){
        modalAufgaben(id,name);
      }else if(action==='del-ma'){
        if(!confirm('Mitarbeiter löschen?'))return;
        try{await apiDel(`/api/mitarbeiter/${id}`);toast('Gelöscht','ok');reloadTab()}catch(e){toast(e.message,'err')}
      }else if(action==='edit-ma'){
        modalMitarbeiter({id,name,pin,ist_admin:btn.dataset.admin==='true',ist_chef:btn.dataset.chef==='true',zeige_winterdienst:btn.dataset.zw!=='false',zeige_gebaeudereinigung:btn.dataset.zg!=='false',zeige_gruenpflege:btn.dataset.zgr!=='false',zeige_projekte:btn.dataset.zp!=='false',winterdienst_alarm:btn.dataset.alarm==='true',soll_stunden:parseFloat(btn.dataset.soll)||38.5,beschaeftigung:btn.dataset.beschaeftigung||'vollzeit'});
      }else if(action==='toggle-todo'){
        try{
          await apiPut(`/api/todos/${id}`,{});
          toast('TODO aktualisiert','ok');
          reloadTab();
        }catch(e){toast(e.message,'err')}
      }else if(action==='del-todo'){
        if(!confirm('TODO wirklich löschen?'))return;
        try{
          await apiDel(`/api/todos/${id}`);
          toast('Gelöscht','ok');
          reloadTab();
        }catch(e){toast(e.message,'err')}
      }else if(action==='del-bericht'){
        if(!confirm('Bericht wirklich löschen? (Fotos, GPS-Daten und TODOs werden ebenfalls gelöscht)'))return;
        try{
          await apiDel(`/api/einsaetze/${id}`);
          toast('Bericht gelöscht','ok');
          const row=btn.closest('.report-row');if(row)row.remove();
        }catch(e){toast(e.message,'err')}
      }else if(action==='toggle-unerledigt'){
        const c=document.getElementById(`unerledigt-${id}`);if(!c)return;
        if(c.style.display==='none'||!c.style.display){
          c.style.display='block';btn.textContent='⚠️ Fehlende ausblenden';
          if(!c.dataset.loaded){
            c.innerHTML='<span style="color:var(--text-muted);font-size:13px">Laden…</span>';
            try{
              const list=await apiGet(`/api/einsaetze/${id}/unerledigt`);c.dataset.loaded='true';
              c.innerHTML=list.length===0
                ?'<span style="color:var(--success);font-size:13px">✅ Alle Aufgaben erledigt</span>'
                :`<div style="font-size:13px;font-weight:700;color:var(--danger);margin-bottom:4px">Nicht erledigt (${list.length}):</div>`+list.map(a=>`<div style="font-size:13px;color:var(--danger);padding:2px 0">✗ ${esc(a.bezeichnung)}</div>`).join('');
            }catch(e){c.innerHTML=`<span style="color:var(--danger);font-size:13px">${esc(e.message)}</span>`}
          }
        }else{c.style.display='none';btn.textContent='⚠️ Fehlende Aufgaben'}
      }else if(action==='toggle-fotos'){
        const c=document.getElementById(`fotos-${id}`);if(!c)return;
        if(c.style.display==='none'||!c.style.display){
          c.style.display='flex';btn.textContent='📷 Fotos verbergen';
          if(!c.dataset.loaded){
            c.innerHTML='<span style="color:var(--text-muted);font-size:13px">Laden…</span>';
            try{
              const list=await apiGet(`/api/fotos/${id}`);c.dataset.loaded='true';
              c.innerHTML=list.length===0?'<span style="color:var(--text-muted);font-size:13px">Keine Fotos</span>':list.map(f=>`<a href="${esc(f.foto_url)}" target="_blank"><img class="report-foto-thumb" src="${esc(f.foto_url)}" alt="Foto" title="${esc(f.beschreibung||'')}"></a>`).join('');
            }catch(e){c.innerHTML=`<span style="color:var(--danger);font-size:13px">${esc(e.message)}</span>`}
          }
        }else{c.style.display='none';btn.textContent='📷 Fotos anzeigen'}
      }
    });
  });
}

function bindModalEvents(){
  o('modal-close','click',closeModal);
  o('btn-save-anlage','click',async()=>{
    const id=document.getElementById('btn-save-anlage')?.dataset.id;
    const body={
      name:document.getElementById('m-name')?.value?.trim(),
      adresse:document.getElementById('m-adresse')?.value?.trim(),
      plz:document.getElementById('m-plz')?.value?.trim(),
      ort:document.getElementById('m-ort')?.value?.trim(),
      lat:document.getElementById('m-lat')?.value?.trim()||null,
      lng:document.getElementById('m-lng')?.value?.trim()||null,
      info_text:document.getElementById('m-info')?.value?.trim(),
      in_winterdienst:document.getElementById('m-in-winter')?.checked||false,
      in_gebaeudereinigung:document.getElementById('m-in-gebaeude')?.checked||false,
      in_gruenpflege:document.getElementById('m-in-gruen')?.checked||false,
    };
    if(!body.name||!body.adresse){toast('Name und Adresse erforderlich','err');return}
    try{
      let anlage;
      if(id){anlage=await apiPut(`/api/anlagen/${id}`,body)}else{anlage=await apiPost('/api/anlagen',body)}
      for(const [key,sparte] of [['m-bild-winter','winterdienst'],['m-bild-gebaeude','gebaeudereinigung'],['m-bild-gruen','gruenpflege']]){
        const f=document.getElementById(key)?.files[0];
        if(f&&anlage.id){const fd=new FormData();fd.append('bild',f);await apiUp(`/api/anlagen/${anlage.id}/bild?sparte=${sparte}`,fd)}
      }
      if(!id&&_draftAufg.length){
        for(const d of _draftAufg){try{await apiPost('/api/aufgaben',{anlage_id:anlage.id,bezeichnung:d.bezeichnung,sparte:d.sparte})}catch(e){}}
        _draftAufg=[];
      }
      closeModal();toast(id?'Gespeichert':'Anlage angelegt','ok');reloadTab();
    }catch(e){toast(e.message,'err')}
  });
  o('btn-save-ma','click',async()=>{
    const id=document.getElementById('btn-save-ma')?.dataset.id;
    const body={
      name:document.getElementById('m-ma-name')?.value?.trim(),
      pin:document.getElementById('m-ma-pin')?.value?.trim(),
      ist_admin:document.getElementById('m-ma-admin')?.checked||false,
      ist_chef:document.getElementById('m-ma-chef')?.checked||false,
      aktiv:true,
      zeige_winterdienst:document.getElementById('m-ma-zw')?.checked||false,
      zeige_projekte:document.getElementById('m-ma-zp')?.checked||false,
      zeige_gebaeudereinigung:document.getElementById('m-ma-zg')?.checked!==false,
      zeige_gruenpflege:document.getElementById('m-ma-zgr')?.checked!==false,
      winterdienst_alarm:document.getElementById('m-ma-alarm')?.checked||false,
      soll_stunden:parseFloat(document.getElementById('m-ma-soll')?.value)||38.5,
      beschaeftigung:document.getElementById('m-ma-beschaeftigung')?.value||'vollzeit',
    };
    if(!body.name||!body.pin){toast('Name und PIN erforderlich','err');return}
    try{if(id){await apiPut(`/api/mitarbeiter/${id}`,body)}else{await apiPost('/api/mitarbeiter',body)};closeModal();toast(id?'Gespeichert':'Angelegt','ok');reloadTab()}
    catch(e){toast(e.message,'err')}
  });
  o('btn-add-aufgabe','click',async()=>{
    const anlageId=document.getElementById('btn-add-aufgabe')?.dataset.anlage;
    const bez=document.getElementById('neue-aufgabe-input')?.value?.trim();
    if(!bez)return;
    try{
      const a=await apiPost('/api/aufgaben',{anlage_id:anlageId,bezeichnung:bez});
      document.getElementById('neue-aufgabe-input').value='';
      const liste=document.getElementById('aufgaben-liste');
      if(liste)liste.appendChild(aufgabeRowEl(a));
      toast('Aufgabe hinzugefügt','ok');
    }catch(e){toast(e.message,'err')}
  });

  // Sparte-Checkboxen: Aufgaben-Sektionen ein-/ausblenden
  o('m-in-winter','change',e=>{const s=document.getElementById('aufg-winter-section');if(s)s.style.display=e.target.checked?'':'none'});
  o('m-in-gebaeude','change',e=>{const s=document.getElementById('aufg-gebaeude-section');if(s)s.style.display=e.target.checked?'':'none'});
  o('m-in-gruen','change',e=>{const s=document.getElementById('aufg-gruen-section');if(s)s.style.display=e.target.checked?'':'none'});

  // Aufgaben inline in Modal hinzufügen
  function addAufgabeToModal(sparte){
    const key=sparte==='gebaeudereinigung'?'gebaeude':sparte==='gruenpflege'?'gruen':'winter';
    const inp=document.getElementById(`aufg-${key}-input`);
    const bez=inp?.value?.trim();if(!bez)return;
    const anlageId=document.getElementById('btn-save-anlage')?.dataset.id;
    if(anlageId){
      apiPost('/api/aufgaben',{anlage_id:anlageId,bezeichnung:bez,sparte}).then(a=>{
        const el=document.getElementById(`aufg-${key}-list`);if(el)el.appendChild(aufgabeModalRow(a));
        inp.value='';toast('Aufgabe hinzugefügt','ok');
      }).catch(e=>toast(e.message,'err'));
    }else{
      const draftId=++_draftCtr;
      _draftAufg.push({draftId,sparte,bezeichnung:bez});
      const el=document.getElementById(`aufg-${key}-list`);if(el)el.appendChild(aufgabeModalRow({draftId,bezeichnung:bez,sparte}));
      inp.value='';
    }
  }
  o('btn-add-winter-aufg','click',()=>addAufgabeToModal('winterdienst'));
  o('btn-add-gebaeude-aufg','click',()=>addAufgabeToModal('gebaeudereinigung'));
  o('btn-add-gruen-aufg','click',()=>addAufgabeToModal('gruenpflege'));
  o('aufg-winter-input','keydown',e=>{if(e.key==='Enter'){e.preventDefault();addAufgabeToModal('winterdienst')}});
  o('aufg-gebaeude-input','keydown',e=>{if(e.key==='Enter'){e.preventDefault();addAufgabeToModal('gebaeudereinigung')}});
  o('aufg-gruen-input','keydown',e=>{if(e.key==='Enter'){e.preventDefault();addAufgabeToModal('gruenpflege')}});
}

async function reloadTab(){
  const tab=pageData.adminTab||'anlagen';
  const c=document.getElementById('admin-tab-content');
  if(c){c.innerHTML=`<div class="loading"><div class="spinner"></div></div>`;c.innerHTML=await renderTab(tab);bindAdminEvents();initKarteIfNeeded()}
}

// ── INIT ──
function init(){
  if(!user){go('login');return}
  updateNachBadge();
  // Badge alle 30s aktualisieren und im Header anzeigen
  setInterval(async()=>{
    if(!user)return;
    await updateNachBadge();
    const b=document.getElementById('btn-mailbox');
    if(b){const badge=window._nachBadge>0?`<span style="position:absolute;top:-4px;right:-4px;background:#ef4444;color:white;border-radius:999px;font-size:10px;font-weight:700;min-width:17px;height:17px;display:flex;align-items:center;justify-content:center;padding:0 3px">${window._nachBadge}</span>`:'';b.innerHTML=`📬${badge}`}
  },30000);
  // URL-Parameter auswerten (z.B. von Push-Klick: /?page=nachrichten)
  const urlParams=new URLSearchParams(location.search);
  const urlPage=urlParams.get('page');
  if(urlPage){const alarmId=urlParams.get('id');history.replaceState({},'','/');go(urlPage,alarmId?{alarmId}:{});return}
  if(einsatzAkt){go('einsatz');return}
  go('home');
}
init();

// ── PWA Install Prompt ────────────────────────────────────────────────────
(function(){
  const DISMISSED_KEY = 'pwa_banner_dismissed';
  if(localStorage.getItem(DISMISSED_KEY)) return;

  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;

  if(isInStandaloneMode) return; // bereits installiert

  // iOS: Hint-Banner mit Anleitung
  if(isIOS){
    // Kurz warten bis App geladen ist
    setTimeout(()=>{
      const hint = document.getElementById('ios-hint');
      if(!hint) return;
      hint.classList.add('show');
      document.getElementById('ios-hint-close').addEventListener('click',()=>{
        hint.classList.remove('show');
        localStorage.setItem(DISMISSED_KEY,'1');
      });
    }, 2500);
    return;
  }

  // Android / Desktop: beforeinstallprompt abfangen
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    setTimeout(()=>{
      const banner = document.getElementById('pwa-banner');
      if(!banner) return;
      banner.classList.add('show');
    }, 2000);
  });

  document.addEventListener('click', e => {
    if(e.target.id === 'pwa-install-btn'){
      if(!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(choice => {
        deferredPrompt = null;
        document.getElementById('pwa-banner')?.classList.remove('show');
        if(choice.outcome === 'accepted') localStorage.setItem(DISMISSED_KEY,'1');
      });
    }
    if(e.target.id === 'pwa-banner-close'){
      document.getElementById('pwa-banner')?.classList.remove('show');
      localStorage.setItem(DISMISSED_KEY,'1');
    }
  });

  window.addEventListener('appinstalled', ()=>{
    document.getElementById('pwa-banner')?.classList.remove('show');
    localStorage.setItem(DISMISSED_KEY,'1');
  });
})();
</script>
